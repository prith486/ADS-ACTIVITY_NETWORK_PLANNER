kind = "web"
previewPath = "/"
title = "Network Fault Detector & Recovery Planner"
version = "1.0.0"
id = "artifacts/network-fault-visualizer"
router = "path"
[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25545

[services.development]
run = "pnpm --filter @workspace/network-fault-visualizer run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/network-fault-visualizer", "run", "build" ]
publicDir = "artifacts/network-fault-visualizer/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25545"
BASE_PATH = "/"
